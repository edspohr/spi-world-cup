<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Colombia blue rounded background -->
  <rect width="32" height="32" rx="6" fill="#003893"/>
  <!-- Football (white sphere) -->
  <circle cx="16" cy="16" r="10" fill="white"/>
  <!-- Black patch: top center pentagon -->
  <polygon points="16,7.5 19.8,10.3 18.4,14.5 13.6,14.5 12.2,10.3" fill="#111"/>
  <!-- Black patch: bottom left -->
  <polygon points="8.2,13.2 12.2,10.3 13.6,14.5 11,18 7.5,17.5" fill="#111"/>
  <!-- Black patch: bottom right -->
  <polygon points="23.8,13.2 19.8,10.3 18.4,14.5 21,18 24.5,17.5" fill="#111"/>
  <!-- Black patch: lower left -->
  <polygon points="11,18 13.6,14.5 18.4,14.5 21,18 16,22.5" fill="#111"/>
  <!-- Gold border -->
  <rect width="32" height="32" rx="6" fill="none" stroke="#FCD116" stroke-width="1.5"/>
</svg>
